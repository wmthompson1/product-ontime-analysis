# Ontop JDBC connection for the job-costing ledger POC mapping.
#
# This documents the connection for MANUAL `ontop query` / `ontop endpoint`
# runs. The path is relative to the repository root, so run manual commands
# from there.
#
# The URL opens the database READ-ONLY (open_mode=1 == SQLITE_OPEN_READONLY),
# and Ontop only ever issues SELECTs. For the strongest guarantee, automated
# runs do NOT use this file at all: they take a read-only backup snapshot of
# the live (WAL-mode) database (parity_check.make_snapshot) and point Ontop at
# the snapshot, so the live database is never opened for writing.
jdbc.url=jdbc:sqlite:hf-space-inventory-sqlgen/app_schema/manufacturing.db?open_mode=1
jdbc.driver=org.sqlite.JDBC
