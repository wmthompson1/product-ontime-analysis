# Ontop JDBC connection for the shop-floor routing POC.
#
# This documents the connection for MANUAL `ontop query` runs. The path is
# relative to the repository root, so run manual commands from there.
#
# The URL opens the database READ-ONLY (open_mode=1 == SQLITE_OPEN_READONLY),
# and Ontop only ever issues SELECTs. For the strongest guarantee the automated
# demo (shop_floor_routing_parity_check.py) does NOT use this file at all: it
# takes a read-only backup snapshot of the live (WAL-mode) database and points
# Ontop at the snapshot, so the live database is never opened for writing. See
# README.md.
jdbc.url=jdbc:sqlite:hf-space-inventory-sqlgen/app_schema/manufacturing.db?open_mode=1
jdbc.driver=org.sqlite.JDBC
