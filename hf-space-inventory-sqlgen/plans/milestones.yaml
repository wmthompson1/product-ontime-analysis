#
# Each milestone is a SCHEMA_VERSION bump in
# replit_integrations/export_graph_metadata.py, which freezes a create-once
# snapshot graph_metadata.v{N}.json (the benchmark artifact; the frozen .vN.json
# files live in the private repo, not this public mirror). Milestones are a spine
# that is INDEPENDENT of the wave / plan spine in index.yaml: waves track planned
# work, milestones benchmark what the canonical graph actually delivered.
