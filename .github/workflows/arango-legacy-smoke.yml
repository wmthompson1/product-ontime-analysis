name: ArangoDB Legacy-Collection Smoke Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  skip-notice:
    name: Skip notice (no ArangoDB credentials)
    runs-on: ubuntu-latest
    if: ${{ secrets.ARANGO_HOST == '' || secrets.ARANGO_HOST == null }}
    steps:
      - name: Write skip summary
        run: |
          echo "## ArangoDB Legacy-Collection Smoke Test" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> **Skipped** — \`ARANGO_HOST\` secret is not configured in this repository." >> "$GITHUB_STEP_SUMMARY"
          echo "> To run the full smoke test, add the \`ARANGO_HOST\`, \`ARANGO_USER\`, and \`ARANGO_PASSWORD\` secrets," >> "$GITHUB_STEP_SUMMARY"
          echo "> or trigger this workflow manually via **workflow_dispatch** from a repository that has them." >> "$GITHUB_STEP_SUMMARY"
          echo "Skipped: ARANGO_HOST secret not present — ArangoDB smoke test will not run."

  arango-smoke:
    name: Verify legacy ArangoDB collections are absent
    runs-on: ubuntu-latest
    if: ${{ secrets.ARANGO_HOST != '' && secrets.ARANGO_HOST != null }}

    services:
      arangodb:
        image: arangodb:3.11
        env:
          ARANGO_ROOT_PASSWORD: ci_test_password
        ports:
          - 8529:8529
        options: >-
          --health-cmd "curl -sf http://localhost:8529/_api/version || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      ARANGO_HOST: ${{ secrets.ARANGO_HOST }}
      ARANGO_USER: ${{ secrets.ARANGO_USER }}
      ARANGO_PASSWORD: ${{ secrets.ARANGO_PASSWORD }}
      ARANGO_DB: manufacturing_graph
      GRAPH_SYNC_ALERT_WEBHOOK: ${{ secrets.GRAPH_SYNC_ALERT_WEBHOOK }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-arango sqlalchemy
          if [ -f hf-space-inventory-sqlgen/requirements.txt ]; then
            pip install -r hf-space-inventory-sqlgen/requirements.txt
          fi

      - name: Wait for ArangoDB to be ready
        run: |
          for i in {1..24}; do
            if curl -sf http://localhost:8529/_api/version > /dev/null 2>&1; then
              echo "ArangoDB is ready"
              break
            fi
            echo "Waiting for ArangoDB... attempt $i/24"
            sleep 5
          done
          curl -sf http://localhost:8529/_api/version

      - name: Create test database in ArangoDB
        run: |
          curl -sf -u root:ci_test_password \
            -X POST http://localhost:8529/_api/database \
            -H "Content-Type: application/json" \
            -d '{"name": "manufacturing_graph"}' || true

      - name: Run ArangoDB legacy-collection smoke test
        id: smoke
        run: |
          python hf-space-inventory-sqlgen/tests/test_perspective_deprecation.py \
            2>&1 | tee /tmp/smoke_output.txt
          exit ${PIPESTATUS[0]}

      - name: Fail if live ArangoDB check was silently skipped
        run: |
          if grep -q "SKIP: could not connect to ArangoDB\|SKIP: could not import ArangoDB" /tmp/smoke_output.txt; then
            echo "ERROR: test_live_arango_collections_absent was skipped due to a connection or import failure."
            echo "ArangoDB must be reachable in CI — check service container health and credentials."
            cat /tmp/smoke_output.txt
            exit 1
          fi
          if ! grep -q "PASS: all legacy collections absent from ArangoDB\|PASS:.*legacy" /tmp/smoke_output.txt; then
            echo "ERROR: test_live_arango_collections_absent did not emit a PASS confirmation."
            echo "This means the live ArangoDB check either skipped or failed."
            cat /tmp/smoke_output.txt
            exit 1
          fi

      - name: Write step summary
        if: always()
        run: |
          echo "## ArangoDB Legacy-Collection Smoke Test" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/smoke_output.txt >> "$GITHUB_STEP_SUMMARY" || echo "(no output captured)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.smoke.outcome }}" = "success" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "> **Result: PASS** — no legacy collections found in ArangoDB." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "> **Result: FAIL** — one or more legacy collections are present. Run \`migrations/drop_legacy_perspective_graph.py\` to remove them." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Show full output on failure
        if: failure()
        run: cat /tmp/smoke_output.txt || true

      - name: Send Slack alert on failure
        if: failure() && env.GRAPH_SYNC_ALERT_WEBHOOK != ''
        run: |
          PAYLOAD=$(python3 - <<'PYEOF'
import datetime, json, os

ts      = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
run_url = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
branch  = "${{ github.ref_name }}"
trigger = "${{ github.event_name }}"

smoke_file = "/tmp/smoke_output.txt"
smoke_out  = open(smoke_file).read().strip() if os.path.exists(smoke_file) else "(no output captured)"
# Truncate to keep Slack payload under limits
if len(smoke_out) > 1500:
    smoke_out = smoke_out[-1500:] + "\n...(truncated)"

blocks = [
    {
        "type": "header",
        "text": {"type": "plain_text", "text": ":rotating_light: ArangoDB Legacy-Collection Smoke Test FAILED"}
    },
    {
        "type": "section",
        "fields": [
            {"type": "mrkdwn", "text": f"*Time (UTC):*\n{ts}"},
            {"type": "mrkdwn", "text": f"*Trigger:*\n`{trigger}`"},
            {"type": "mrkdwn", "text": f"*Branch:*\n`{branch}`"},
        ]
    },
    {
        "type": "section",
        "text": {"type": "mrkdwn", "text": f"*Smoke test output:*\n```{smoke_out}```"}
    },
    {
        "type": "section",
        "text": {
            "type": "mrkdwn",
            "text": f"Run `migrations/drop_legacy_perspective_graph.py` to remove legacy collections.\n<{run_url}|View workflow run>"
        }
    }
]
print(json.dumps({"blocks": blocks}))
PYEOF
          )

          curl -sS -o /dev/null -w "Slack webhook HTTP status: %{http_code}\n" \
            -X POST -H "Content-Type: application/json" \
            -d "${PAYLOAD}" \
            "${{ secrets.GRAPH_SYNC_ALERT_WEBHOOK }}"
