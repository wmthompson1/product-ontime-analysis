name: SQLMesh CI/CD

on:
  push:
    branches: [main, master]
    paths:
      - "Utilities/SQLMesh/**"
  pull_request:
    branches: [main, master]
    paths:
      - "Utilities/SQLMesh/**"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.13"
  SQLMESH_PROJECT_PATH: "Utilities/SQLMesh"
  # The two raw models import the SME-approved masking_matrix / masking_type
  # modules that live in hf-space-inventory-sqlgen. SQLMesh executes Python
  # models from a serialized snapshot whose env does NOT replay the in-file
  # sys.path bootstrap, so that dir must be importable at interpreter startup
  # (load AND snapshot execution) — not just when the model files are imported.
  PYTHONPATH: ${{ github.workspace }}/hf-space-inventory-sqlgen

jobs:
  lint-and-test:
    name: Lint & Test Models
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install SQLMesh
        run: |
          python -m pip install --upgrade pip
          pip install -r ${{ env.SQLMESH_PROJECT_PATH }}/requirements.txt

      - name: Migrate state to installed SQLMesh version
        working-directory: ${{ env.SQLMESH_PROJECT_PATH }}
        run: sqlmesh migrate

      - name: Validate SQLMesh project
        working-directory: ${{ env.SQLMESH_PROJECT_PATH }}
        run: |
          echo "Validating SQLMesh configuration..."
          sqlmesh info

      - name: Run SQLMesh tests
        working-directory: ${{ env.SQLMESH_PROJECT_PATH }}
        run: |
          echo "Running unit tests..."
          sqlmesh test --verbose

      # Note: Audits are executed automatically during 'sqlmesh plan' and 'sqlmesh run'
      # No separate audit step is needed as they are part of the validation and execution phases
      - name: Audit execution info
        run: echo "Audits run automatically during plan validation"

  plan-dev:
    name: Plan Dev Environment
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install SQLMesh
        run: pip install -r ${{ env.SQLMESH_PROJECT_PATH }}/requirements.txt

      - name: Migrate state to installed SQLMesh version
        working-directory: ${{ env.SQLMESH_PROJECT_PATH }}
        run: sqlmesh migrate

      - name: Plan dev environment
        working-directory: ${{ env.SQLMESH_PROJECT_PATH }}
        run: |
          echo "Planning changes for dev environment..."
          sqlmesh plan dev --auto-apply --skip-backfill

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install SQLMesh
        run: pip install -r ${{ env.SQLMESH_PROJECT_PATH }}/requirements.txt

      - name: Migrate state to installed SQLMesh version
        working-directory: ${{ env.SQLMESH_PROJECT_PATH }}
        run: sqlmesh migrate

      # Audits execute automatically during plan and run phases
      - name: Plan and apply production
        working-directory: ${{ env.SQLMESH_PROJECT_PATH }}
        run: |
          echo "Deploying to production..."
          sqlmesh plan --auto-apply --create-from prod --no-prompts

      - name: Run models and audits
        working-directory: ${{ env.SQLMESH_PROJECT_PATH }}
        run: sqlmesh run

      - name: Generate lineage report
        working-directory: ${{ env.SQLMESH_PROJECT_PATH }}
        run: |
          echo "Generating lineage DAG..."
          sqlmesh dag --file lineage.svg || true

      - name: Upload lineage artifact
        uses: actions/upload-artifact@v4
        with:
          name: lineage-dag
          path: ${{ env.SQLMESH_PROJECT_PATH }}/lineage.svg
          if-no-files-found: ignore
