name: ArangoDB ↔ SQLite drift alert

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

jobs:
  drift-check:
    name: Health check — bridge collection counts match SQLite
    runs-on: ubuntu-latest
    env:
      ARANGO_HOST: ${{ secrets.ARANGO_HOST }}
      ARANGO_DB: ${{ secrets.ARANGO_DB }}
      ARANGO_USER: ${{ secrets.ARANGO_USER }}
      ARANGO_ROOT_PASSWORD: ${{ secrets.ARANGO_ROOT_PASSWORD }}
      GRAPH_SYNC_ALERT_WEBHOOK: ${{ secrets.GRAPH_SYNC_ALERT_WEBHOOK }}

    steps:
      - name: Skip — ARANGO_HOST not configured
        if: ${{ env.ARANGO_HOST == '' }}
        run: |
          echo "ARANGO_HOST is not set — drift check silenced."
          echo "Add ARANGO_HOST, ARANGO_DB, ARANGO_USER, ARANGO_ROOT_PASSWORD"
          echo "as repository secrets to enable the drift alert."

      - name: Checkout repository
        if: ${{ env.ARANGO_HOST != '' }}
        uses: actions/checkout@v4

      - name: Set up Python
        if: ${{ env.ARANGO_HOST != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: ${{ env.ARANGO_HOST != '' }}
        working-directory: hf-space-inventory-sqlgen
        run: |
          python -m pip install --upgrade pip
          pip install python-arango
          if [ -f requirements.txt ]; then pip install -r requirements.txt || true; fi

      - name: Run bridge collection health check
        if: ${{ env.ARANGO_HOST != '' }}
        id: health
        working-directory: hf-space-inventory-sqlgen
        env:
          DRIFT_REPORT_PATH: ${{ github.workspace }}/drift_report.txt
        run: |
          python tests/test_bridge_collection_health.py
          echo "health_exit=$?" >> "$GITHUB_OUTPUT"

      - name: Write step summary (pass)
        if: ${{ env.ARANGO_HOST != '' && success() }}
        run: |
          TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          {
            echo "## Bridge Collection Health — PASS"
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| **Time (UTC)** | ${TS} |"
            echo "| **Branch** | \`${{ github.ref_name }}\` |"
            echo "ArangoDB Perspective_Intents and Perspective_Concepts counts match SQLite."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Collect drift details
        if: ${{ env.ARANGO_HOST != '' && failure() }}
        id: drift
        run: |
          DRIFT_FILE="${{ github.workspace }}/drift_report.txt"
          if [ -f "${DRIFT_FILE}" ]; then
            DRIFT_DETAILS=$(cat "${DRIFT_FILE}")
          else
            DRIFT_DETAILS="(no structured drift report — check workflow logs)"
          fi
          # Escape newlines for GitHub output
          DRIFT_DETAILS_ESCAPED="${DRIFT_DETAILS//$'\n'/'\\n'}"
          echo "details=${DRIFT_DETAILS_ESCAPED}" >> "$GITHUB_OUTPUT"

      - name: Write step summary (failure)
        if: ${{ env.ARANGO_HOST != '' && failure() }}
        run: |
          TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          DRIFT_FILE="${{ github.workspace }}/drift_report.txt"
          {
            echo "## :rotating_light: ArangoDB ↔ SQLite Drift Detected"
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| **Time (UTC)** | ${TS} |"
            echo "| **Workflow run** | [View logs](${RUN_URL}) |"
            echo "| **Branch** | \`${{ github.ref_name }}\` |"
            echo ""
            echo "### Drift Details"
            echo '```'
            if [ -f "${DRIFT_FILE}" ]; then
              cat "${DRIFT_FILE}"
            else
              echo "(no structured report — see job logs)"
            fi
            echo '```'
            echo ""
            echo "> Re-run \`graph_sync.py\` to bring ArangoDB back in sync with SQLite."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Send Slack alert
        if: ${{ env.ARANGO_HOST != '' && failure() && env.GRAPH_SYNC_ALERT_WEBHOOK != '' }}
        run: |
          PAYLOAD=$(python3 - <<'PYEOF'
import datetime, json, os

ts      = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
run_url = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
branch  = "${{ github.ref_name }}"
drift_file = "${{ github.workspace }}/drift_report.txt"
drift   = open(drift_file).read().strip() if os.path.exists(drift_file) else "(no structured drift report — check workflow logs)"

blocks = [
    {
        "type": "header",
        "text": {"type": "plain_text", "text": ":rotating_light: ArangoDB \u2194 SQLite Drift Detected"}
    },
    {
        "type": "section",
        "fields": [
            {"type": "mrkdwn", "text": f"*Time (UTC):*\n{ts}"},
            {"type": "mrkdwn", "text": f"*Branch:*\n`{branch}`"},
        ]
    },
    {
        "type": "section",
        "text": {"type": "mrkdwn", "text": f"*Drift details:*\n```{drift}```"}
    },
    {
        "type": "section",
        "text": {
            "type": "mrkdwn",
            "text": f"Re-run `graph_sync.py` to sync ArangoDB with SQLite.\n<{run_url}|View workflow run>"
        }
    }
]
print(json.dumps({"blocks": blocks}))
PYEOF
          )

          curl -sS -o /dev/null -w "Slack webhook HTTP status: %{http_code}\n" \
            -X POST -H "Content-Type: application/json" \
            -d "${PAYLOAD}" \
            "${{ secrets.GRAPH_SYNC_ALERT_WEBHOOK }}"

      - name: Send email alert
        if: >-
          ${{ env.ARANGO_HOST != '' && failure() &&
              secrets.ALERT_EMAIL_TO != '' &&
              secrets.ALERT_SMTP_HOST != '' }}
        env:
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_SMTP_HOST: ${{ secrets.ALERT_SMTP_HOST }}
          ALERT_SMTP_PORT: ${{ secrets.ALERT_SMTP_PORT }}
          ALERT_SMTP_USER: ${{ secrets.ALERT_SMTP_USER }}
          ALERT_SMTP_PASSWORD: ${{ secrets.ALERT_SMTP_PASSWORD }}
        run: |
          python3 - <<'PYEOF'
import datetime, os, smtplib
from email.mime.text import MIMEText

ts       = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
run_url  = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
branch   = "${{ github.ref_name }}"
drift_file = "${{ github.workspace }}/drift_report.txt"
drift    = open(drift_file).read().strip() if os.path.exists(drift_file) else "(no structured drift report)"

to_addr   = os.environ.get("ALERT_EMAIL_TO", "")
from_addr = os.environ.get("ALERT_EMAIL_FROM") or "noreply@github-actions"
smtp_host = os.environ.get("ALERT_SMTP_HOST", "")
smtp_port = int(os.environ.get("ALERT_SMTP_PORT", "587"))
smtp_user = os.environ.get("ALERT_SMTP_USER", "")
smtp_pass = os.environ.get("ALERT_SMTP_PASSWORD", "")

if not (to_addr and smtp_host):
    print("Email alert skipped: ALERT_EMAIL_TO or ALERT_SMTP_HOST not set.")
    raise SystemExit(0)

subject = f"[ALERT] ArangoDB \u2194 SQLite Drift Detected — {branch} @ {ts}"
body = f"""\
ArangoDB \u2194 SQLite Drift Detected
======================================

Time (UTC): {ts}
Branch:     {branch}
Run:        {run_url}

Drift Details
-------------
{drift}

Action Required
---------------
Re-run graph_sync.py to bring ArangoDB back in sync with SQLite.
"""

msg = MIMEText(body)
msg["Subject"] = subject
msg["From"]    = from_addr
msg["To"]      = to_addr

try:
    with smtplib.SMTP(smtp_host, smtp_port, timeout=15) as s:
        s.ehlo()
        s.starttls()
        if smtp_user:
            s.login(smtp_user, smtp_pass)
        s.sendmail(from_addr, [to_addr], msg.as_string())
    print(f"Email alert sent to {to_addr}")
except Exception as exc:
    print(f"Email alert failed (non-fatal): {exc}")
PYEOF
