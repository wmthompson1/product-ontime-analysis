name: Resolution Message Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  resolution-messages:
    name: Resolution message regression tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sqlalchemy
          if [ -f hf-space-inventory-sqlgen/requirements.txt ]; then
            pip install -r hf-space-inventory-sqlgen/requirements.txt
          fi

      - name: Run resolution message tests
        run: |
          python hf-space-inventory-sqlgen/tests/test_resolution_messages.py
