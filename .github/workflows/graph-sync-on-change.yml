name: Auto-sync graph when bridge data changes

on:
  schedule:
    - cron: '0 2 * * *'
  push:
    branches: [ main ]
    paths:
      - 'hf-space-inventory-sqlgen/app_schema/manufacturing.db'
      - 'hf-space-inventory-sqlgen/app_schema/schema_sqlite.sql'
      - 'hf-space-inventory-sqlgen/app_schema/ground_truth/reviewer_manifest.json'
      - 'hf-space-inventory-sqlgen/graph_sync.py'
      - 'hf-space-inventory-sqlgen/scripts/install_sync_triggers.py'
      - 'hf-space-inventory-sqlgen/dab_config.json'
      - 'hf-space-inventory-sqlgen/scripts/sync_db_to_dab_config.py'
      - 'hf-space-inventory-sqlgen/scripts/reconstruct_containment_graph.py'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (preview changes without writing to ArangoDB)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  graph-sync:
    name: Sync SQLite bridge tables → ArangoDB
    runs-on: ubuntu-latest
    env:
      ARANGO_HOST: ${{ secrets.ARANGO_HOST }}
      ARANGO_DB: ${{ secrets.ARANGO_DB }}
      ARANGO_USER: ${{ secrets.ARANGO_USER }}
      ARANGO_ROOT_PASSWORD: ${{ secrets.ARANGO_ROOT_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: hf-space-inventory-sqlgen
        run: |
          python -m pip install --upgrade pip
          pip install python-arango
          if [ -f requirements.txt ]; then pip install -r requirements.txt || true; fi

      - name: Install SQLite sync triggers
        working-directory: hf-space-inventory-sqlgen
        run: python scripts/install_sync_triggers.py --verify || python scripts/install_sync_triggers.py

      - name: Dry-run sync (preview)
        working-directory: hf-space-inventory-sqlgen
        run: python graph_sync.py --dry-run

      - name: Live sync to ArangoDB
        if: ${{ github.event.inputs.dry_run != 'true' && env.ARANGO_HOST != '' }}
        working-directory: hf-space-inventory-sqlgen
        run: python graph_sync.py

      - name: DAB config sync preview (dry-run only)
        working-directory: hf-space-inventory-sqlgen
        run: python scripts/sync_db_to_dab_config.py --dry-run
        # NOTE: This repo has no real Data API Builder service (that lives in the
        # private Windows/SQL Server repo). dab_config.json here is a JSON metadata
        # store — a prototype reference artifact. We intentionally do NOT run the
        # live sync or auto-commit dab_config.json from CI: the CRM demo entities
        # (Customer, CustomerAddress, Sales, …) reference schemas that don't exist
        # in manufacturing.db and would be incorrectly flagged as stale.

      - name: Dry-run containment graph reconstruction (preview)
        working-directory: hf-space-inventory-sqlgen
        run: python scripts/reconstruct_containment_graph.py --dry-run

      - name: Live containment graph reconstruction
        if: ${{ github.event.inputs.dry_run != 'true' && env.ARANGO_HOST != '' }}
        working-directory: hf-space-inventory-sqlgen
        run: python scripts/reconstruct_containment_graph.py

      - name: Health check — bridge collection counts match SQLite
        if: ${{ github.event.inputs.dry_run != 'true' && env.ARANGO_HOST != '' }}
        working-directory: hf-space-inventory-sqlgen
        env:
          DRIFT_REPORT_PATH: ${{ github.workspace }}/drift_report.txt
        run: python tests/test_bridge_collection_health.py

      - name: Skip live sync (no ArangoDB secrets or dry-run requested)
        if: ${{ github.event.inputs.dry_run == 'true' || env.ARANGO_HOST == '' }}
        run: |
          echo "Live sync skipped."
          echo "  dry_run input : ${{ github.event.inputs.dry_run }}"
          echo "  ARANGO_HOST set: ${{ env.ARANGO_HOST != '' }}"
          echo "Set ARANGO_HOST, ARANGO_DB, ARANGO_USER, ARANGO_ROOT_PASSWORD"
          echo "as repository secrets to enable live sync."

      - name: Sweep 1 — coverage gap check
        continue-on-error: true
        run: |
          python scripts/verify_metadata_meaning.py --skip-on-no-arango \
            2>&1 | tee /tmp/sweep1_output.txt; true
          python3 - <<'PYEOF' >> "$GITHUB_ENV"
import re, os
content = open('/tmp/sweep1_output.txt').read()
if 'SKIP:' in content:
    status = 'skipped'
    gap_count = ''
elif 'Sweep 1 PASSED' in content:
    status = 'passed'
    gap_count = '0'
else:
    m = re.search(r'FAIL:\s*(\d+)', content)
    gap_count = m.group(1) if m else ''
    status = 'failed' if (gap_count and gap_count != '0') else 'unknown'
print(f'SWEEP1_STATUS={status}')
print(f'SWEEP1_GAP_COUNT={gap_count}')
PYEOF

      - name: Notify on failure
        if: failure()
        env:
          GRAPH_SYNC_ALERT_WEBHOOK: ${{ secrets.GRAPH_SYNC_ALERT_WEBHOOK }}
        run: |
          TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          DRIFT_FILE="${{ github.workspace }}/drift_report.txt"

          if [ -f "${DRIFT_FILE}" ]; then
            DRIFT_DETAILS=$(cat "${DRIFT_FILE}")
          else
            DRIFT_DETAILS=""
          fi

          # Resolve Sweep 1 status for display
          SWEEP1_STATUS="${SWEEP1_STATUS:-}"
          SWEEP1_GAP_COUNT="${SWEEP1_GAP_COUNT:-}"
          if [ "${SWEEP1_STATUS}" = "passed" ]; then
            SWEEP1_SUMMARY=":white_check_mark: Sweep 1: all concepts have approved SQL snippets"
          elif [ "${SWEEP1_STATUS}" = "failed" ] && [ -n "${SWEEP1_GAP_COUNT}" ]; then
            SWEEP1_SUMMARY=":warning: Sweep 1: ${SWEEP1_GAP_COUNT} concept(s) without approved SQL snippets"
          elif [ "${SWEEP1_STATUS}" = "skipped" ]; then
            SWEEP1_SUMMARY=":fast_forward: Sweep 1: skipped (ArangoDB not reachable)"
          else
            SWEEP1_SUMMARY=":question: Sweep 1: status unknown"
          fi

          # Write a GitHub Actions step summary visible in the workflow UI
          {
            echo "## :rotating_light: Graph Sync Failed"
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| **Time (UTC)** | ${TS} |"
            echo "| **Workflow run** | [View logs](${RUN_URL}) |"
            echo "| **Branch** | \`${{ github.ref_name }}\` |"
            echo "| **Triggered by** | ${{ github.actor }} |"
            echo ""
            echo "### Sweep 1 Coverage"
            echo "${SWEEP1_SUMMARY}"
            if [ -n "${DRIFT_DETAILS}" ]; then
              echo ""
              echo "### Drift Details"
              echo '```'
              echo "${DRIFT_DETAILS}"
              echo '```'
              echo ""
              echo "> Re-run \`graph_sync.py\` to bring ArangoDB back in sync with SQLite."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # Optionally POST to Slack webhook if secret is configured
          if [ -n "${GRAPH_SYNC_ALERT_WEBHOOK}" ]; then
            PAYLOAD=$(SWEEP1_STATUS="${SWEEP1_STATUS}" SWEEP1_GAP_COUNT="${SWEEP1_GAP_COUNT}" python3 - <<'PYEOF'
import datetime, json, os

ts      = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
run_url = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
branch  = "${{ github.ref_name }}"
actor   = "${{ github.actor }}"
drift_file = "${{ github.workspace }}/drift_report.txt"
drift   = open(drift_file).read().strip() if os.path.exists(drift_file) else ""

sweep1_status    = os.environ.get("SWEEP1_STATUS", "")
sweep1_gap_count = os.environ.get("SWEEP1_GAP_COUNT", "")
if sweep1_status == "passed":
    sweep1_text = ":white_check_mark: *Sweep 1:* all concepts have approved SQL snippets"
elif sweep1_status == "failed" and sweep1_gap_count:
    sweep1_text = f":warning: *Sweep 1:* {sweep1_gap_count} concept(s) without approved SQL snippets"
elif sweep1_status == "skipped":
    sweep1_text = ":fast_forward: *Sweep 1:* skipped (ArangoDB not reachable)"
else:
    sweep1_text = ":question: *Sweep 1:* status unknown"

fields = [
    {"type": "mrkdwn", "text": f"*Time (UTC):*\n{ts}"},
    {"type": "mrkdwn", "text": f"*Branch:*\n`{branch}`"},
    {"type": "mrkdwn", "text": f"*Triggered by:*\n{actor}"},
]
blocks = [
    {
        "type": "header",
        "text": {"type": "plain_text", "text": ":rotating_light: Graph Sync Failed"}
    },
    {"type": "section", "fields": fields},
    {
        "type": "section",
        "text": {"type": "mrkdwn", "text": sweep1_text}
    },
]
if drift:
    blocks.append({
        "type": "section",
        "text": {
            "type": "mrkdwn",
            "text": f"*Drift details:*\n```{drift}```"
        }
    })
blocks.append({
    "type": "section",
    "text": {
        "type": "mrkdwn",
        "text": f"Re-run `graph_sync.py` to bring ArangoDB in sync with SQLite.\n<{run_url}|View workflow run>"
    }
})
print(json.dumps({"blocks": blocks}))
PYEOF
            )
            curl -sS -o /dev/null -w "Slack webhook HTTP status: %{http_code}\n" \
              -X POST -H "Content-Type: application/json" \
              -d "${PAYLOAD}" \
              "${GRAPH_SYNC_ALERT_WEBHOOK}"
          fi
