# --- Gateway Connection ---
# --- Gateway Connection ---
gateways:
  duckdb:
    connection:
      # For more information on configuring the connection to your execution engine, visit:
      # https://sqlmesh.readthedocs.io/en/stable/reference/configuration/#connection
      # https://sqlmesh.readthedocs.io/en/stable/integrations/engines/duckdb/#connection-options
      type: duckdb
      database: db.db
      # concurrent_tasks: 1
      # register_comments: True
      # pre_ping: False
      # pretty_sql: False
      # schema_differ_overrides:
      # catalog_type_overrides:
      # catalogs:
      # extensions:
      # connector_config:
      # secrets:
      # filesystems:
      # token:

default_gateway: duckdb

# --- Loader ---
# masking_helpers.py lives under models/raw so the Python models can import it as
# Utilities.SQLMesh.models.raw.masking_helpers, but it is a shared helper module,
# not a SQLMesh model — keep the loader from trying to load it as one.
ignore_patterns:
  - ".ipynb_checkpoints/*"
  - "models/raw/masking_helpers.py"

# --- Model Defaults ---
# https://sqlmesh.readthedocs.io/en/stable/reference/model_configuration/#model-defaults

model_defaults:
  dialect: duckdb
  start: 2026-01-07 # Start date for backfill history
  cron: "@daily" # Run models daily at 12am UTC (can override per model)

# --- Linting Rules ---
# Enforce standards for your team
# https://sqlmesh.readthedocs.io/en/stable/guides/linter/

linter:
  enabled: true
  rules:
    - ambiguousorinvalidcolumn
    - invalidselectstarexpansion
    - noambiguousprojections
