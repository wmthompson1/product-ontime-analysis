    file: plan-001a-tables-columns/plan.yaml
    title: "Tables & Columns — INFORMATION_SCHEMA.TABLES and COLUMNS discovery"
    assigned_to: Manufacturing Assistant (014)
    status: Delegated

  - id: plan-001b-constraints-relationships
    file: plan-001b-constraints-relationships/plan.yaml
