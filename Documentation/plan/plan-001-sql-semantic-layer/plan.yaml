  - id: plan-001c-index-metadata
    file: plan-001c-index-metadata/plan.yaml
    title: "Index Metadata & Schema Overlay — Perspective and Intent Mapping from ArangoDB graph"
    assigned_to: Ambient Agent (007)
    status: Delegated

  - id: plan-001d-views-dependencies
    file: plan-001d-views-dependencies/plan.yaml
    title: "Views, Routines & Dependencies — Views, stored procedures, dependency graph"
    assigned_to:
