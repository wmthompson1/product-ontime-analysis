plan_id: plan-001-sql-semantic-layer
title: "Plan-001: SQL Semantic Layer Foundation"
topic: "SQL Semantic Layer for Manufacturing ERP"
created: "2026-03-13"
status: In Progress
delegated_by: Herald
assigned_to:
  - Manufacturing Assistant (014)
  - Queue Router (015)
  - Ambient Agent (007)

objective: >
  Build a comprehensive SQL semantic layer for the manufacturing ERP system, covering core
  data domains including work orders, inventory, production scheduling, and quality control.

steps:
  - number: 1
    title: Analyze existing ERP schema
    description: >
      Review the manufacturing database structure, identify key tables, relationships,
      and business rules from the imported Python agent codebase.
  - number: 2
    title: Define semantic models
    description: >
      Create semantic model definitions for core manufacturing entities (work orders,
      BOMs, inventory, production lines).
  - number: 3
    title: Build metric definitions
    description: >
      Define key manufacturing KPIs (OTD rate, cycle time, scrap rate, utilization)
      as reusable metric layers.
  - number: 4
    title: Create dimension tables
    description: >
      Establish shared dimension definitions (time, product, facility, supplier)
      for consistent reporting.
  - number: 5
    title: Validate with sample queries
    description: >
      Test semantic layer definitions against representative business questions.

