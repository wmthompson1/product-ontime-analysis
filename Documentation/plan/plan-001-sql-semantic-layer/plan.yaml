      - Queue Router (015)
    status: Delegated

  - id: plan-001e-fk-hierarchy
    file: plan-001e-fk-hierarchy/plan.yaml
    title: "Foreign Key Parent-Child Hierarchy — Root/leaf detection, adjacency list, recursive traversal, diamond patterns"
    assigned_to:
      - Queue Router (015)
      - Manufacturing Assistant (014)
    status: Delegated

  - id: plan-001f-pragma-tests
    file: plan-001f-pragma-tests/plan.yaml
    title: "SQLite PRAGMA Test Module — INFORMATION_SCHEMA equivalents via PRAGMA, unit tests against sample schema"
    assigned_to:
