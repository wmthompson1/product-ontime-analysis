index_version: "1.1"
description: >
  Central registry of all Herald orchestration plans. Herald consults this file
  to list available plans, resolve parent-child relationships, and route tasks to
  the correct plan directory. Update this file whenever a new plan is created.

  Directory convention: plan-{NNN}-{slug}/
    plan.yaml   — metadata, objective, steps, sections, agent_activity (immutable audit log)
    tasks.yaml  — mutable work board (task id, title, status, assigned_to, wave, depends_on)
  Sub-plan convention: plan-{NNN}{letter}-{slug}/ (e.g., plan-001a-tables-columns/)

plans:
