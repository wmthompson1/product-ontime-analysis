objective: >
  Execute the first production-parity masking run using the MCP Handshake.
  This plan transitions the 12/12 verified staging models from raw PII
  to deterministic, hashed dimensionality. The handshake is currently idling
  at the "Commit" point following a successful parity audit and contract validation.
  This plan governs the completion of that execution: BFS hierarchy generation,
  mask_pii.py implementation, and the live masking run.

# ── Steps (from pod903) ───────────────────────────────────────────────────────
steps:
  - number: 1
    title: "Pre-Flight Parity Audit"
    description: >
      Invoke verify_parity.py via the MCP Registry to confirm 100% schema/model/docs
      alignment before any data transformation runs.
    gate: "Exit Code 0 Required"
    status: completed
    result: "verify_parity.py → SUCCESS: 12/12 verified, 0 discrepancies (2026-03-15)"

  - number: 2
    title: "BFS Hierarchy Generation"
    description: >
      Trigger hierarchy_crawler_001 to traverse foreign_key_hierarchy.json and
      establish the dimension-first Level 0 → Level N processing order for the
      masking engine. This ensures stg_operation_type and stg_products are masked
      before stg_operation and stg_production_schedule.
    status: completed
    result: >
      foreign_key_hierarchy.json exists at
      Utilities/SQLMesh/analysis/impact/output/foreign_key_hierarchy.json.
      BFS data available; crawler skill invocation is a runtime call.

  - number: 3
    title: "Tiered Masking Invoke"
    description: >
      Call masking_engine_001 with the 'manufacturing' perspective and a secure
      GEMIN salt. Requires mask_pii.py to exist at the project root as the
      skill entry_point. On success, writes masking_log.json and updates db.db.
    gate: "mask_pii.py must exist; gemin_salt must be supplied at runtime"
    status: pending
    blocked_by: "mask_pii.py not yet implemented"

# ── Architecture sections ─────────────────────────────────────────────────────
sections:
  - id: sec-001
    title: "Masking Levels"
    content: >
      Level 1: Deterministic hash (SHA-256 + GEMIN salt) applied to all primary key
      identifiers (workorder_base_id, supplier_id, product_id, resource_id).
      Level 2: Numeric noise injection (±5%) applied to cost and rate columns
      (setup_cost_per_hr, hourly_rate, run_cost_per_hr, etc.).
      Level 3: Faker persona replacement for free-text fields (notes, descriptions,
      vendor names) — persona "George Torres" for quality/operations contexts.

  - id: sec-002
    title: "BFS Processing Order"
    content: >
      The hierarchy_crawler_001 determines masking order from foreign_key_hierarchy.json.
      Dimensions are masked first (stg_operation_type, stg_products, stg_suppliers),
      then transaction tables (stg_operation, stg_production_schedule, stg_operation_sched).
      This preserves referential integrity: masked foreign key values in transactions
      match already-masked primary keys in dimensions.

  - id: sec-003
    title: "Expected Artifacts"
    content: >
      - Utilities/SQLMesh/analysis/impact/output/masking_log.json
        (table-by-table masking report: rows processed, columns masked, level applied)
      - Utilities/SQLMesh/db.db (masked state — replaces raw PII with hashed values)
      - A pre-mask backup should be created before the first run:
        Utilities/SQLMesh/db.db.premask.bak

  - id: sec-004
    title: "GEMIN Salt Policy"
    content: >
      The gemin_salt parameter must NEVER be hardcoded. Delivery options:
      (1) CLI flag: orchestrator_handshake.py --salt <value>
      (2) Environment variable: GEMIN_SALT in .env (loaded via python-dotenv)
      (3) Vault/secret store (future).
      The masking_engine_001 skill.json marks gemin_salt as required[];
      the orchestrator will exit code 3 if it is absent.

