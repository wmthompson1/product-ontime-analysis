# Folder-agnostic plan activity ledger (append-only).
#
# Every event correlates by a logical key, never by file path, so the link
# survives a plan or snapshot being moved between folders. An event keys on ONE
# of two spines:
#   * plan spine      — wave / plan_id / task_id; resolve via
#                       hf-space-inventory-sqlgen/plans/index.yaml
#   * milestone spine — version (schema version) and/or milestone (M-series);
#                       resolve via hf-space-inventory-sqlgen/plans/milestones.yaml
#
# Plan tracking started at WAVE 4; earlier waves (1-3) are intentionally not
# backfilled. Milestone artifact mappings are a SEPARATE spine and may predate
# wave 4 — the canonical-graph milestones were frozen before tracking began.
ledger_version: 1
activity_start_wave: 4

events:
  - ts: "2026-06-17T00:00:00Z"
    wave: 4
    plan_id: plan-008-consumer-delivery-persistence
    task_id: task-008-010
    event: tracking_started
    actor: User
    to_status: pending
    artifact:
      - replit_integrations/graph_metadata_canonical_example.json
      - replit_integrations/graph_metadata_canonical_example.md
    note: >
      Activity tracking anchored at wave 4 (Final Schema Lock & Canonical Edge
      Generation). task-008-010 carries forward after the completed wave-3 Replit
      graph-metadata integration.

  - ts: "2026-06-17T00:00:01Z"
    wave: 4
    plan_id: plan-8-wave-4-synthetic-erp-expansion
    task_id: null
    event: tracking_started
    actor: User
    to_status: approved-in-principle
    artifact:
      - replit_integrations/plan-8-wave-4-synthetic-erp-expansion.md
    note: >
      Wave 4's second strand: synthetic ERP expansion (traceability spine). It
      lives in a different folder than plan-008 yet shares wave 4 — proof that the
